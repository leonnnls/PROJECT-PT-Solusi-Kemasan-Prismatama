<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solusi Kemasan Prismatama</title>
    <script>
      // Fix for libraries that try to overwrite window.fetch in environments where it's read-only
      try {
        const originalFetch = window.fetch;
        if (originalFetch) {
          Object.defineProperty(window, 'fetch', {
            get: () => originalFetch,
            set: () => { console.warn('Attempted to overwrite window.fetch - ignored'); },
            configurable: true
          });
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
